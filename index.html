<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Феникс Музыка — Массовая загрузка 500+</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0f0f11;
      color: #fff;
      font-family: 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .app-container {
      display: flex;
      flex: 1;
      height: calc(100vh - 180px);
    }

    .sidebar {
      width: 280px;
      background: #161619;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border-right: 1px solid #222226;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #ffcc00;
    }
    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .nav-item {
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      color: #a0a0a8;
      font-weight: 600;
      transition: all 0.2s;
    }
    .nav-item:hover, .nav-item.active {
      background: #232328;
      color: #fff;
    }
    .nav-item.mix-tab {
      background: linear-gradient(135deg, #ffcc00 0%, #ff5500 100%);
      color: #000;
      font-weight: 700;
    }

    /* Панель Владельца */
    .owner-section {
      background: #1f1f26;
      border: 1px solid #33333d;
      padding: 12px;
      border-radius: 12px;
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .owner-title {
      font-size: 12px;
      font-weight: 700;
      color: #ffcc00;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .owner-section input {
      background: #121215;
      border: 1px solid #333;
      padding: 8px;
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      outline: none;
    }
    .owner-btn {
      background: #ffcc00;
      border: none;
      padding: 8px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      color: #000;
      font-size: 12px;
    }
    .status-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #333;
      color: #aaa;
    }
    .status-badge.active { background: #22c55e; color: #fff; }

    /* Индикатор массовой загрузки */
    .upload-progress-box {
      display: none;
      flex-direction: column;
      gap: 4px;
      margin-top: 6px;
    }
    .upload-progress-bar {
      width: 100%;
      height: 6px;
      background: #111;
      border-radius: 3px;
      overflow: hidden;
    }
    .upload-progress-fill {
      height: 100%;
      background: #22c55e;
      width: 0%;
      transition: width 0.1s;
    }
    .upload-status-text {
      font-size: 10px;
      color: #aaa;
      text-align: center;
    }

    .main-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: linear-gradient(180deg, #18181c 0%, #0f0f11 100%);
    }

    .section-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; }

    .search-input {
      width: 100%;
      padding: 12px 18px;
      background: #232328;
      border: 1px solid #33333d;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      margin-bottom: 20px;
      outline: none;
    }

    .track-list { display: flex; flex-direction: column; gap: 8px; }
    .track-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-radius: 10px;
      background: #161619;
      cursor: pointer;
      transition: background 0.2s;
    }
    .track-row:hover, .track-row.active { background: #25252c; }
    .track-row.active .track-row-title { color: #ffcc00; }
    .track-row-left { display: flex; align-items: center; gap: 14px; }
    .track-row-img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; }
    .track-row-title { font-weight: 600; font-size: 14px; }
    .track-row-artist { color: #888892; font-size: 12px; }
    .delete-btn {
      background: none;
      border: none;
      color: #ff4444;
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
      display: none;
    }

    /* Плеер */
    .player-bar {
      height: 90px;
      background: #161619;
      border-top: 1px solid #222226;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .now-playing { display: flex; align-items: center; gap: 14px; width: 260px; }
    .now-playing-cover { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; background: #222; }
    
    .player-controls-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 40%;
    }
    .btn-group { display: flex; align-items: center; gap: 16px; }
    .control-btn { background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; }
    .play-main-btn {
      background: #ffcc00;
      color: #000;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .progress-wrapper { display: flex; align-items: center; gap: 10px; width: 100%; font-size: 12px; color: #777; }
    .progress-bar-bg { flex: 1; height: 4px; background: #333; border-radius: 2px; cursor: pointer; position: relative; }
    .progress-bar-fill { height: 100%; background: #ffcc00; border-radius: 2px; width: 0%; }

    .volume-container { display: flex; align-items: center; gap: 8px; width: 160px; }
    .volume-slider { width: 100px; accent-color: #ffcc00; cursor: pointer; }

    /* Блок Текста Песни */
    .lyrics-bar {
      height: 90px;
      background: #111114;
      border-top: 1px solid #1a1a1f;
      padding: 12px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
    }
    .lyrics-header {
      font-size: 11px;
      font-weight: 700;
      color: #ffcc00;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
    }
    .lyrics-content {
      font-size: 13px;
      color: #ccc;
      white-space: pre-line;
      line-height: 1.4;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }
    #fileInputFiles, #fileInputFolder { display: none; }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="sidebar">
      <div class="logo">🔥 Феникс</div>
      <ul class="nav-list">
        <li class="nav-item mix-tab active" onclick="switchTab('mix', this)">✨ Феникс Микс</li>
        <li class="nav-item" onclick="switchTab('search', this)">🔍 Поиск</li>
        <li class="nav-item" onclick="switchTab('home', this)">🎵 Вся база (<span id="totalTrackCount">0</span>)</li>
      </ul>

      <div class="owner-section">
        <div class="owner-title">
          <span>👑 Доступ Владельца</span>
          <span class="status-badge" id="statusBadge">Гость</span>
        </div>
        
        <div id="loginBox" style="display: flex; flex-direction: column; gap: 6px;">
          <input type="password" id="ownerPassword" placeholder="Пароль (777)">
          <button class="owner-btn" onclick="loginOwner()">Войти</button>
        </div>

        <div id="addMusicBox" style="display: none; flex-direction: column; gap: 6px;">
          <button class="owner-btn" onclick="document.getElementById('fileInputFiles').click()">🎵 Выбрать 500+ MP3</button>
          <button class="owner-btn" style="background:#e6b800;" onclick="document.getElementById('fileInputFolder').click()">📁 Загрузить ПАПКУ</button>
          
          <input type="file" id="fileInputFiles" accept="audio/*" multiple onchange="handleFileUpload(this.files)">
          <input type="file" id="fileInputFolder" accept="audio/*" webkitdirectory directory multiple onchange="handleFileUpload(this.files)">
          
          <button class="owner-btn" style="background:#ff4444; color:#fff;" onclick="clearAllTracks()">🗑️ Очистить всю базу</button>

          <div class="upload-progress-box" id="uploadProgressBox">
            <div class="upload-progress-bar">
              <div class="upload-progress-fill" id="uploadProgressFill"></div>
            </div>
            <div class="upload-status-text" id="uploadStatusText">Загрузка 0 / 0...</div>
          </div>
        </div>
      </div>
    </div>

    <div class="main-content">
      <div id="tab-mix" class="tab-content active">
        <h2 class="section-title">🔥 Феникс Микс</h2>
        <div class="track-list" id="mixTrackList"></div>
      </div>

      <div id="tab-search" class="tab-content">
        <h2 class="section-title">Поиск треков</h2>
        <input type="text" class="search-input" id="searchInput" placeholder="Искать трек или артиста..." oninput="handleSearch()">
        <div class="track-list" id="searchTrackList"></div>
      </div>

      <div id="tab-home" class="tab-content">
        <h2 class="section-title">Каталог треков</h2>
        <div class="track-list" id="homeTrackList"></div>
      </div>
    </div>
  </div>

  <div class="player-bar">
    <div class="now-playing">
      <img src="https://picsum.photos/300/300?random=0" id="playerCover" class="now-playing-cover">
      <div>
        <div id="playerTitle" style="font-weight:700;">Загрузите треки</div>
        <div id="playerArtist" style="color:#888; font-size:12px;">—</div>
      </div>
    </div>

    <div class="player-controls-container">
      <div class="btn-group">
        <button class="control-btn" onclick="prevTrack()">⏮</button>
        <button class="control-btn play-main-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="control-btn" onclick="nextTrack()">⏭</button>
      </div>
      <div class="progress-wrapper">
        <span id="currentTime">0:00</span>
        <div class="progress-bar-bg" onclick="setProgress(event)">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <span id="duration">0:00</span>
      </div>
    </div>

    <div class="volume-container">
      <button class="control-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="1" oninput="changeVolume(this.value)">
    </div>

    <audio id="audio"></audio>
  </div>

  <div class="lyrics-bar">
    <div class="lyrics-header">
      <span>📜 Текст песни</span>
      <span id="editLyricsBtn" style="cursor:pointer; display:none;" onclick="editLyrics()">✏️ Редактировать</span>
    </div>
    <div class="lyrics-content" id="lyricsContent">Текст песни пока не добавлен.</div>
  </div>

  <script>
    const OWNER_PASSWORD = "777";
    let isOwnerLoggedIn = false;

    let songs = [];
    let currentTrackIndex = -1;
    let lastVolume = 1;

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const playerCover = document.getElementById('playerCover');
    const playerTitle = document.getElementById('playerTitle');
    const playerArtist = document.getElementById('playerArtist');
    const progressFill = document.getElementById('progressFill');
    const lyricsContent = document.getElementById('lyricsContent');

    function loginOwner() {
      const pass = document.getElementById('ownerPassword').value;
      if (pass === OWNER_PASSWORD) {
        isOwnerLoggedIn = true;
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('addMusicBox').style.display = 'flex';
        document.getElementById('editLyricsBtn').style.display = 'inline';
        const badge = document.getElementById('statusBadge');
        badge.innerText = 'Владелец';
        badge.classList.add('active');
        renderAllLists();
        alert('Успешный вход! Доступна массовая загрузка.');
      } else {
        alert('Неверный пароль!');
      }
    }

    // Асинхронная обработка большого количества файлов (500+)
    async function handleFileUpload(files) {
      if (!files || files.length === 0) return;

      const audioFiles = Array.from(files).filter(f => f.type.startsWith('audio/') || f.name.endsWith('.mp3') || f.name.endsWith('.wav') || f.name.endsWith('.flac'));
      
      if (audioFiles.length === 0) {
        alert('В выбранных файлах не найдено аудиозаписей!');
        return;
      }

      const progressBox = document.getElementById('uploadProgressBox');
      const progressFill = document.getElementById('uploadProgressFill');
      const statusText = document.getElementById('uploadStatusText');

      progressBox.style.display = 'flex';

      const chunkSize = 50; // Добавляем порциями по 50 файлов, чтобы страница не зависала
      const total = audioFiles.length;

      for (let i = 0; i < total; i += chunkSize) {
        const chunk = audioFiles.slice(i, i + chunkSize);

        chunk.forEach(file => {
          // Автоматическое разбиение имени "Артист - Трек.mp3"
          let nameParts = file.name.replace(/\.[^/.]+$/, "").split(" - ");
          let artistName = nameParts.length > 1 ? nameParts[0].trim() : "Неизвестный артист";
          let trackName = nameParts.length > 1 ? nameParts.slice(1).join(" - ").trim() : nameParts[0].trim();

          songs.push({
            id: Date.now() + Math.random(),
            title: trackName,
            artist: artistName,
            src: URL.createObjectURL(file),
            cover: `https://picsum.photos/300/300?random=${Math.floor(Math.random()*100)}`,
            lyrics: "Текст песни отсутствует."
          });
        });

        // Обновляем прогресс
        let loadedCount = Math.min(i + chunkSize, total);
        let percent = Math.round((loadedCount / total) * 100);
        progressFill.style.width = percent + '%';
        statusText.innerText = `Обработка: ${loadedCount} / ${total} (${percent}%)`;

        // Даем браузеру перевести дыхание
        await new Promise(r => setTimeout(r, 10));
      }

      progressBox.style.display = 'none';
      renderAllLists();

      if (currentTrackIndex === -1 && songs.length > 0) {
        loadTrack(0);
      }

      alert(`Успешно добавлено ${total} треков!`);
    }

    function clearAllTracks() {
      if (!isOwnerLoggedIn) return;
      if (confirm("Вы уверены, что хотите удалить все треки из списка?")) {
        songs = [];
        audio.pause();
        currentTrackIndex = -1;
        playerTitle.innerText = "Загрузите треки";
        playerArtist.innerText = "—";
        lyricsContent.innerText = "Текст песни пока не добавлен.";
        renderAllLists();
      }
    }

    function deleteTrack(index, e) {
      e.stopPropagation();
      if (!isOwnerLoggedIn) return;
      songs.splice(index, 1);
      if (currentTrackIndex >= songs.length) currentTrackIndex = songs.length - 1;
      if (songs.length === 0) {
        audio.pause();
        currentTrackIndex = -1;
        playerTitle.innerText = "Загрузите треки";
        playerArtist.innerText = "—";
        lyricsContent.innerText = "Текст песни пока не добавлен.";
      } else {
        loadTrack(currentTrackIndex >= 0 ? currentTrackIndex : 0);
      }
      renderAllLists();
    }

    function loadTrack(index) {
      if (index < 0 || index >= songs.length) return;
      currentTrackIndex = index;
      const track = songs[index];
      playerTitle.innerText = track.title;
      playerArtist.innerText = track.artist;
      playerCover.src = track.cover;
      lyricsContent.innerText = track.lyrics || "Текст песни отсутствует.";
      audio.src = track.src;

      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: track.title,
          artist: track.artist,
          artwork: [{ src: track.cover, sizes: '300x300', type: 'image/jpeg' }]
        });
      }

      renderAllLists();
    }

    function togglePlay() {
      if (songs.length === 0) return;
      if (currentTrackIndex === -1) loadTrack(0);

      if (audio.paused) {
        audio.play();
        playBtn.innerText = '❚❚';
      } else {
        audio.pause();
        playBtn.innerText = '▶';
      }
    }

    function changeVolume(val) {
      audio.volume = val;
      document.getElementById('muteBtn').innerText = val == 0 ? '🔇' : '🔊';
    }

    function toggleMute() {
      if (audio.volume > 0) {
        lastVolume = audio.volume;
        audio.volume = 0;
        document.getElementById('volumeSlider').value = 0;
        document.getElementById('muteBtn').innerText = '🔇';
      } else {
        audio.volume = lastVolume;
        document.getElementById('volumeSlider').value = lastVolume;
        document.getElementById('muteBtn').innerText = '🔊';
      }
    }

    function editLyrics() {
      if (!isOwnerLoggedIn || currentTrackIndex === -1) return;
      const newLyrics = prompt("Введите текст песни:", songs[currentTrackIndex].lyrics);
      if (newLyrics !== null) {
        songs[currentTrackIndex].lyrics = newLyrics;
        lyricsContent.innerText = newLyrics;
      }
    }

    function handleSearch() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const found = songs.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q));
      document.getElementById('searchTrackList').innerHTML = found.length 
        ? found.map(s => renderTrackRow(s, songs.indexOf(s))).join('')
        : '<p style="color:#777;">Треки не найдены</p>';
    }

    function nextTrack() {
      if (!songs.length) return;
      loadTrack((currentTrackIndex + 1) % songs.length);
      audio.play();
      playBtn.innerText = '❚❚';
    }

    function prevTrack() {
      if (!songs.length) return;
      loadTrack((currentTrackIndex - 1 + songs.length) % songs.length);
      audio.play();
      playBtn.innerText = '❚❚';
    }

    function renderTrackRow(song, index) {
      const isActive = index === currentTrackIndex;
      return `
        <div class="track-row ${isActive ? 'active' : ''}" onclick="selectAndPlay(${index})">
          <div class="track-row-left">
            <img src="${song.cover}" class="track-row-img">
            <div>
              <div class="track-row-title">${song.title}</div>
              <div class="track-row-artist">${song.artist}</div>
            </div>
          </div>
          ${isOwnerLoggedIn ? `<button class="delete-btn" style="display:block;" onclick="deleteTrack(${index}, event)">🗑️</button>` : ''}
        </div>
      `;
    }

    function selectAndPlay(index) {
      loadTrack(index);
      audio.play();
      playBtn.innerText = '❚❚';
    }

    function renderAllLists() {
      document.getElementById('totalTrackCount').innerText = songs.length;
      const emptyMsg = '<p style="color:#777; font-size:14px;">Список пуст. Зайдите с паролем 777 и загрузите файлы или всю папку.</p>';
      document.getElementById('mixTrackList').innerHTML = songs.length ? songs.map((s, i) => renderTrackRow(s, i)).join('') : emptyMsg;
      document.getElementById('homeTrackList').innerHTML = songs.length ? songs.map((s, i) => renderTrackRow(s, i)).join('') : emptyMsg;
      handleSearch();
    }

    function switchTab(tabName, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      document.getElementById(`tab-${tabName}`).classList.add('active');
      el.classList.add('active');
    }

    // Горячие клавиши
    window.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
      if (e.code === 'ArrowRight') { audio.currentTime += 5; }
      if (e.code === 'ArrowLeft') { audio.currentTime -= 5; }
      if (e.code === 'ArrowUp') { changeVolume(Math.min(1, audio.volume + 0.1)); document.getElementById('volumeSlider').value = audio.volume; }
      if (e.code === 'ArrowDown') { changeVolume(Math.max(0, audio.volume - 0.1)); document.getElementById('volumeSlider').value = audio.volume; }
    });

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        progressFill.style.width = (audio.currentTime / audio.duration) * 100 + '%';
        document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
        document.getElementById('duration').innerText = formatTime(audio.duration);
      }
    });

    function setProgress(e) {
      const rect = e.currentTarget.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    }

    function formatTime(s) {
      if (isNaN(s)) return "0:00";
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec < 10 ? '0' : ''}${sec}`;
    }

    audio.addEventListener('ended', nextTrack);
    renderAllLists();
  </script>
</body>
</html>
