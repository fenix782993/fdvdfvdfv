<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Феникс Музыка</title>
  <style>
    body {
      background-color: #121212;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .player-card {
      background: #181818;
      padding: 24px;
      border-radius: 16px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 1px solid #282828;
    }
    .cover {
      width: 100%;
      height: 250px;
      border-radius: 12px;
      object-fit: cover;
      margin-bottom: 16px;
    }
    .title {
      font-size: 20px;
      font-weight: bold;
      margin: 0 0 4px 0;
    }
    .artist {
      color: #b3b3b3;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }
    button {
      background: #ffcc00; /* Фирменный цвет "Феникса" */
      border: none;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 20px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s ease;
    }
    button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <div class="player-card">
    <img src="https://picsum.photos/300/300" alt="Обложка" class="cover" id="cover">
    <div class="title" id="title">Феникс Трек</div>
    <div class="artist" id="artist">Неизвестный Исполнитель</div>
    
    <audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    
    <div class="controls">
      <button id="playBtn" onclick="togglePlay()">▶</button>
    </div>
  </div>

  <script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');

    function togglePlay() {
      if (audio.paused) {
        audio.play();
        playBtn.innerText = '❚❚';
      } else {
        audio.pause();
        playBtn.innerText = '▶';
      }
    }
  </script>
</body>
</html>
