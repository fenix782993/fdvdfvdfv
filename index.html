<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Феникс Музыка</title>

  <meta name="theme-color" content="#ffcc00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #121214;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* Шапка сайта */
    .top-header {
      height: 56px;
      background: #18181c;
      border-bottom: 1px solid #24242a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
      color: #ffcc00;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .profile-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #25252d;
      border: 1px solid #383845;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
    }

    .profile-btn.active {
      border-color: #22c55e;
      background: #1f2d24;
    }

    /* Основная рабочая область */
    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Боковое / Нижнее меню для мобилок */
    .sidebar {
      width: 220px;
      background: #18181c;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-right: 1px solid #24242a;
      flex-shrink: 0;
    }

    @media (max-width: 768px) {
      .app-body {
        flex-direction: column-reverse;
      }
      .sidebar {
        width: 100%;
        height: 60px;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
        border-right: none;
        border-top: 1px solid #24242a;
        padding: 0;
      }
      .nav-group-title {
        display: none;
      }
      .nav-item {
        flex-direction: column;
        font-size: 10px !important;
        gap: 2px !important;
        padding: 6px !important;
      }
    }

    .nav-group-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #666;
      font-weight: 700;
      padding: 8px 10px 4px 10px;
    }

    .nav-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: #a0a0aa;
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-item.active {
      background: #ffcc00;
      color: #000;
      font-weight: 700;
    }

    /* Контент */
    .main-content {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: linear-gradient(180deg, #16161a 0%, #121214 100%);
    }

    .wave-banner {
      background: linear-gradient(135deg, #ffcc00 0%, #ff4500 100%);
      border-radius: 16px;
      padding: 20px;
      color: #000;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .wave-info h1 {
      font-size: 24px;
      font-weight: 900;
    }

    .wave-info p {
      font-size: 13px;
      font-weight: 600;
      opacity: 0.9;
    }

    .wave-play-btn {
      background: #000;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 24px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      align-self: flex-start;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .track-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .track-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .track-row.active {
      background: #262630;
    }

    .track-row.active .track-title {
      color: #ffcc00;
    }

    .track-left {
      display: flex;
      align-items: center;
      gap: 12px;
      overflow: hidden;
    }

    .track-img {
      width: 44px;
      height: 44px;
      border-radius: 6px;
      object-fit: cover;
      background: #2a2a32;
      flex-shrink: 0;
    }

    .track-title {
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      color: #888;
      font-size: 12px;
    }

    .like-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
    }

    .like-btn.active {
      color: #ff3355;
    }

    /* Нижний Плеер */
    .player-bar {
      height: 70px;
      background: #18181c;
      border-top: 1px solid #24242a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .now-playing {
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 50%;
    }

    .now-playing-cover {
      width: 44px;
      height: 44px;
      border-radius: 6px;
      object-fit: cover;
      background: #222;
      flex-shrink: 0;
    }

    .now-playing-info {
      overflow: hidden;
    }

    #playerTitle {
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #playerArtist {
      color: #888;
      font-size: 11px;
    }

    .player-center {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-play-main {
      background: #ffcc00;
      color: #000;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 16px;
      border: none;
      cursor: pointer;
    }

    .btn-icon {
      background: none;
      border: none;
      color: #aaa;
      font-size: 18px;
      cursor: pointer;
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .admin-modal {
      background: #1e1e24;
      padding: 20px;
      border-radius: 12px;
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .admin-modal input {
      background: #121215;
      border: 1px solid #333;
      padding: 10px;
      border-radius: 6px;
      color: #fff;
      text-align: center;
    }

    .admin-modal button {
      background: #ffcc00;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
    }

    .admin-panel-inline {
      display: none;
      background: #23232d;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 16px;
      flex-direction: column;
      gap: 8px;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }
    #fileInputFiles { display: none; }
  </style>
</head>
<body>

  <div class="top-header">
    <div class="logo">🔥 Феникс</div>
    <div class="header-right">
      <div class="profile-btn" id="profileBtn" onclick="openAdminModal()">👤</div>
    </div>
  </div>

  <div class="app-body">
    <div class="sidebar">
      <div class="nav-item active" onclick="switchTab('wave', this)">✨ <span>Волна</span></div>
      <div class="nav-item" onclick="switchTab('home', this)">🎵 <span>Музыка (<span id="totalCount">0</span>)</span></div>
      <div class="nav-item" onclick="switchTab('favorites', this)">❤️ <span>Лайки (<span id="favCount">0</span>)</span></div>
    </div>

    <div class="main-content">
      <div class="admin-panel-inline" id="adminPanel">
        <div style="font-weight:700; color:#ffcc00; font-size:12px;">👑 Панель Админа</div>
        <button style="background:#ffcc00; border:none; padding:8px; border-radius:6px; font-weight:700;" onclick="document.getElementById('fileInputFiles').click()">🎵 Загрузить MP3</button>
        <button style="background:#ff4444; color:#fff; border:none; padding:8px; border-radius:6px; font-weight:700;" onclick="clearAllTracks()">🗑️ Очистить</button>
        <input type="file" id="fileInputFiles" accept="audio/*" multiple onchange="handleFileUpload(this.files)">
      </div>

      <div id="tab-wave" class="tab-content active">
        <div class="wave-banner">
          <div class="wave-info">
            <h1>Моя волна</h1>
            <p>Случайный микс из ваших треков</p>
          </div>
          <button class="wave-play-btn" onclick="startRandomMix()">▶ Включить</button>
        </div>
        <div class="section-title">В разброс</div>
        <div class="track-list" id="waveTrackList"></div>
      </div>

      <div id="tab-home" class="tab-content">
        <div class="section-title">Все треки</div>
        <div class="track-list" id="homeTrackList"></div>
      </div>

      <div id="tab-favorites" class="tab-content">
        <div class="section-title">Любимые ❤️</div>
        <div class="track-list" id="favTrackList"></div>
      </div>
    </div>
  </div>

  <div class="player-bar">
    <div class="now-playing">
      <img src="https://picsum.photos/100/100" id="playerCover" class="now-playing-cover">
      <div class="now-playing-info">
        <div id="playerTitle">Выберите трек</div>
        <div id="playerArtist">—</div>
      </div>
    </div>

    <div class="player-center">
      <button class="btn-icon" onclick="prevTrack()">⏮</button>
      <button class="btn-play-main" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="btn-icon" onclick="nextTrack()">⏭</button>
    </div>

    <audio id="audio"></audio>
  </div>

  <div class="modal-overlay" id="adminModal">
    <div class="admin-modal">
      <h3 style="color:#ffcc00; text-align:center;">Вход Владельца</h3>
      <input type="password" id="adminPassword" placeholder="Пароль">
      <button onclick="checkAdminPassword()">Войти</button>
      <button style="background:#333; color:#ccc;" onclick="closeAdminModal()">Отмена</button>
    </div>
  </div>

  <script>
    const SECRET_PASSWORD = "Fenix12";
    let isOwnerLoggedIn = false;
    let songs = [];
    let favorites = new Set();
    let currentTrackIndex = -1;

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');

    // === База Данных IndexedDB ===
    let db;
    const dbReq = indexedDB.open("FenixMobileDB", 1);
    dbReq.onupgradeneeded = (e) => {
      db = e.target.result;
      if (!db.objectStoreNames.contains("songs")) {
        db.createObjectStore("songs", { keyPath: "id" });
      }
    };
    dbReq.onsuccess = (e) => {
      db = e.target.result;
      loadStoredSongs();
    };

    function saveSongToDB(song) {
      if (!db) return;
      const tx = db.transaction("songs", "readwrite");
      tx.objectStore("songs").put(song);
    }

    function clearDB() {
      if (!db) return;
      const tx = db.transaction("songs", "readwrite");
      tx.objectStore("songs").clear();
    }

    function loadStoredSongs() {
      if (!db) return;
      const tx = db.transaction("songs", "readonly");
      const req = tx.objectStore("songs").getAll();
      req.onsuccess = () => {
        const stored = req.result;
        if (stored && stored.length > 0) {
          songs = stored.map(s => {
            const blob = new Blob([s.fileData], { type: s.fileType });
            return { ...s, src: URL.createObjectURL(blob) };
          });
          renderAllLists();
          if (songs.length > 0) loadTrack(0);
        }
      };
    }

    function openAdminModal() {
      if (isOwnerLoggedIn) return alert("Вы уже вошли!");
      document.getElementById('adminModal').style.display = 'flex';
    }

    function closeAdminModal() {
      document.getElementById('adminModal').style.display = 'none';
      document.getElementById('adminPassword').value = '';
    }

    function checkAdminPassword() {
      if (document.getElementById('adminPassword').value === SECRET_PASSWORD) {
        isOwnerLoggedIn = true;
        document.getElementById('adminPanel').style.display = 'flex';
        document.getElementById('profileBtn').classList.add('active');
        closeAdminModal();
        renderAllLists();
      } else {
        alert("Неверный пароль!");
      }
    }

    async function handleFileUpload(files) {
      if (!files.length) return;
      for (let file of files) {
        let parts = file.name.replace(/\.[^/.]+$/, "").split(" - ");
        let artist = parts.length > 1 ? parts[0].trim() : "Артист";
        let title = parts.length > 1 ? parts.slice(1).join(" - ").trim() : parts[0].trim();

        const buffer = await file.arrayBuffer();
        const songObj = {
          id: Date.now() + Math.random(),
          title: title,
          artist: artist,
          src: URL.createObjectURL(file),
          cover: `https://picsum.photos/200/200?random=${Math.floor(Math.random()*100)}`,
          fileData: buffer,
          fileType: file.type || 'audio/mpeg'
        };

        songs.push(songObj);
        saveSongToDB(songObj);
      }
      renderAllLists();
      if (currentTrackIndex === -1 && songs.length > 0) loadTrack(0);
    }

    function clearAllTracks() {
      if (!isOwnerLoggedIn) return;
      if (confirm("Удалить всё?")) {
        songs = [];
        favorites.clear();
        clearDB();
        audio.pause();
        currentTrackIndex = -1;
        renderAllLists();
      }
    }

    function startRandomMix() {
      if (!songs.length) return;
      songs.sort(() => Math.random() - 0.5);
      loadTrack(0);
      togglePlay();
      renderAllLists();
    }

    function loadTrack(index) {
      if (index < 0 || index >= songs.length) return;
      currentTrackIndex = index;
      const track = songs[index];
      document.getElementById('playerTitle').innerText = track.title;
      document.getElementById('playerArtist').innerText = track.artist;
      document.getElementById('playerCover').src = track.cover;
      audio.src = track.src;
      renderAllLists();
    }

    function togglePlay() {
      if (!songs.length) return;
      if (currentTrackIndex === -1) loadTrack(0);
      if (audio.paused) {
        audio.play();
        playBtn.innerText = '❚❚';
      } else {
        audio.pause();
        playBtn.innerText = '▶';
      }
    }

    function nextTrack() {
      if (!songs.length) return;
      currentTrackIndex = (currentTrackIndex + 1) % songs.length;
      loadTrack(currentTrackIndex);
      audio.play();
      playBtn.innerText = '❚❚';
    }

    function prevTrack() {
      if (!songs.length) return;
      currentTrackIndex = (currentTrackIndex - 1 + songs.length) % songs.length;
      loadTrack(currentTrackIndex);
      audio.play();
      playBtn.innerText = '❚❚';
    }

    function toggleFavorite(id, e) {
      e.stopPropagation();
      if (favorites.has(id)) favorites.delete(id);
      else favorites.add(id);
      renderAllLists();
    }

    function renderTrackRow(song, index) {
      const isActive = index === currentTrackIndex;
      const isFav = favorites.has(song.id);
      return `
        <div class="track-row ${isActive ? 'active' : ''}" onclick="selectAndPlay(${index})">
          <div class="track-left">
            <img src="${song.cover}" class="track-img">
            <div>
              <div class="track-title">${song.title}</div>
              <div class="track-artist">${song.artist}</div>
            </div>
          </div>
          <button class="like-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(${song.id}, event)">❤️</button>
        </div>
      `;
    }

    function selectAndPlay(index) {
      loadTrack(index);
      audio.play();
      playBtn.innerText = '❚❚';
    }

    function renderAllLists() {
      document.getElementById('totalCount').innerText = songs.length;
      document.getElementById('favCount').innerText = favorites.size;
      const empty = '<p style="color:#666; font-size:12px; padding:10px;">Пусто</p>';
      
      document.getElementById('waveTrackList').innerHTML = songs.length ? songs.map((s, i) => renderTrackRow(s, i)).join('') : empty;
      document.getElementById('homeTrackList').innerHTML = songs.length ? songs.map((s, i) => renderTrackRow(s, i)).join('') : empty;
      
      const favSongs = songs.filter(s => favorites.has(s.id));
      document.getElementById('favTrackList').innerHTML = favSongs.length ? favSongs.map(s => renderTrackRow(s, songs.indexOf(s))).join('') : empty;
    }

    function switchTab(tabName, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      document.getElementById(`tab-${tabName}`).classList.add('active');
      el.classList.add('active');
    }

    audio.addEventListener('ended', nextTrack);
  </script>
</body>
</html>
