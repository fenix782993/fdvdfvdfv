<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Феникс Музыка — Рабочая версия</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0f0f11;
      color: #fff;
      font-family: 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .app-container {
      display: flex;
      flex: 1;
      height: calc(100vh - 90px);
    }

    .sidebar {
      width: 260px;
      background: #161619;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border-right: 1px solid #222226;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #ffcc00;
      margin-bottom: 8px;
    }
    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .nav-item {
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      color: #a0a0a8;
      font-weight: 600;
      transition: all 0.2s;
    }
    .nav-item:hover, .nav-item.active {
      background: #232328;
      color: #fff;
    }
    .nav-item.mix-tab {
      background: linear-gradient(135deg, #ffcc00 0%, #ff5500 100%);
      color: #000;
      font-weight: 700;
    }

    /* Панель Владельца */
    .owner-section {
      background: #1f1f26;
      border: 1px solid #33333d;
      padding: 14px;
      border-radius: 12px;
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .owner-title {
      font-size: 13px;
      font-weight: 700;
      color: #ffcc00;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .owner-section input {
      background: #121215;
      border: 1px solid #333;
      padding: 8px 10px;
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      outline: none;
    }
    .owner-btn {
      background: #ffcc00;
      border: none;
      padding: 8px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      color: #000;
    }
    .status-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #333;
      color: #aaa;
    }
    .status-badge.active { background: #22c55e; color: #fff; }

    .main-content {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
      background: linear-gradient(180deg, #18181c 0%, #0f0f11 100%);
    }

    .section-title { font-size: 24px; font-weight: 700; margin-bottom: 16px; }

    .mix-banner {
      background: linear-gradient(135deg, #241c03 0%, #421c00 100%);
      border: 1px solid #ffcc0044;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .mix-info h1 { font-size: 28px; color: #ffcc00; margin-bottom: 6px; }
    .mix-info p { color: #ccc; font-size: 14px; }
    .mix-play-btn {
      background: #ffcc00;
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 800;
      cursor: pointer;
    }

    .search-input {
      width: 100%;
      padding: 12px 18px;
      background: #232328;
      border: 1px solid #33333d;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      margin-bottom: 20px;
      outline: none;
    }

    .track-list { display: flex; flex-direction: column; gap: 8px; }
    .track-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-radius: 10px;
      background: #161619;
      cursor: pointer;
      transition: background 0.2s;
    }
    .track-row:hover, .track-row.active { background: #25252c; }
    .track-row.active .track-row-title { color: #ffcc00; }
    .track-row-left { display: flex; align-items: center; gap: 16px; }
    .track-row-img { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; }
    .track-row-title { font-weight: 600; font-size: 15px; }
    .track-row-artist { color: #888892; font-size: 13px; }

    .player-bar {
      height: 90px;
      background: #161619;
      border-top: 1px solid #222226;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
    }
    .now-playing { display: flex; align-items: center; gap: 16px; width: 280px; }
    .now-playing-cover { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; }
    
    .player-controls-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 45%;
    }
    .btn-group { display: flex; align-items: center; gap: 20px; }
    .control-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }
    .play-main-btn {
      background: #ffcc00;
      color: #000;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .progress-wrapper { display: flex; align-items: center; gap: 12px; width: 100%; font-size: 12px; color: #777; }
    .progress-bar-bg { flex: 1; height: 4px; background: #333; border-radius: 2px; cursor: pointer; position: relative; }
    .progress-bar-fill { height: 100%; background: #ffcc00; border-radius: 2px; width: 0%; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }
    #fileInput { display: none; }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="sidebar">
      <div class="logo">🔥 Феникс</div>
      <ul class="nav-list">
        <li class="nav-item mix-tab active" onclick="switchTab('mix', this)">✨ Феникс Микс</li>
        <li class="nav-item" onclick="switchTab('search', this)">🔍 Поиск</li>
        <li class="nav-item" onclick="switchTab('home', this)">🎵 Вся база</li>
      </ul>

      <div class="owner-section">
        <div class="owner-title">
          <span>👑 Доступ Владельца</span>
          <span class="status-badge" id="statusBadge">Гость</span>
        </div>
        
        <div id="loginBox" style="display: flex; flex-direction: column; gap: 8px;">
          <input type="password" id="ownerPassword" placeholder="Пароль (777)">
          <button class="owner-btn" onclick="loginOwner()">Войти</button>
        </div>

        <div id="addMusicBox" style="display: none; flex-direction: column; gap: 8px;">
          <button class="owner-btn" onclick="document.getElementById('fileInput').click()">📁 Загрузить MP3 с ПК</button>
          <input type="file" id="fileInput" accept="audio/*" multiple onchange="handleFileUpload(this.files)">
        </div>
      </div>
    </div>

    <div class="main-content">
      
      <div id="tab-mix" class="tab-content active">
        <div class="mix-banner">
          <div class="mix-info">
            <h1>🔥 Феникс Микс</h1>
            <p>Нажми кнопку справа, чтобы начать прослушивание</p>
          </div>
          <button class="mix-play-btn" onclick="startMix()">Запустить Микс ▶</button>
        </div>
        <h2 class="section-title">Список воспроизведения</h2>
        <div class="track-list" id="mixTrackList"></div>
      </div>

      <div id="tab-search" class="tab-content">
        <h2 class="section-title">Поиск треков</h2>
        <input type="text" class="search-input" id="searchInput" placeholder="Искать трек или артиста..." oninput="handleSearch()">
        <div class="track-list" id="searchTrackList"></div>
      </div>

      <div id="tab-home" class="tab-content">
        <h2 class="section-title">Каталог треков</h2>
        <div class="track-list" id="homeTrackList"></div>
      </div>

    </div>
  </div>

  <div class="player-bar">
    <div class="now-playing">
      <img src="https://picsum.photos/300/300?random=1" id="playerCover" class="now-playing-cover">
      <div>
        <div id="playerTitle" style="font-weight:700;">Нажмите ▶ для старта</div>
        <div id="playerArtist" style="color:#888; font-size:13px;">—</div>
      </div>
    </div>

    <div class="player-controls-container">
      <div class="btn-group">
        <button class="control-btn" onclick="prevTrack()">⏮</button>
        <button class="control-btn play-main-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="control-btn" onclick="nextTrack()">⏭</button>
      </div>
      <div class="progress-wrapper">
        <span id="currentTime">0:00</span>
        <div class="progress-bar-bg" onclick="setProgress(event)">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <span id="duration">0:00</span>
      </div>
    </div>

    <audio id="audio" crossorigin="anonymous"></audio>
  </div>

  <script>
    const OWNER_PASSWORD = "777";
    let isOwnerLoggedIn = false;

    // Гарантированно рабочие аудиопотоки
    let songs = [
      { id: 1, title: "I Got Love", artist: "Miyagi & Эндшпиль", src: "https://stream.zeno.fm/f3wvbbqmdg8uv", cover: "https://picsum.photos/300/300?random=1" },
      { id: 2, title: "Вика любит ПЭПЭ", artist: "Ганвест", src: "https://stream.zeno.fm/f3wvbbqmdg8uv", cover: "https://picsum.photos/300/300?random=2" },
      { id: 3, title: "Чёрное платье", artist: "DALEKONEANGEL", src: "https://stream.zeno.fm/f3wvbbqmdg8uv", cover: "https://picsum.photos/300/300?random=3" }
    ];

    let currentTrackIndex = 0;
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const playerCover = document.getElementById('playerCover');
    const playerTitle = document.getElementById('playerTitle');
    const playerArtist = document.getElementById('playerArtist');
    const progressFill = document.getElementById('progressFill');

    function loginOwner() {
      const pass = document.getElementById('ownerPassword').value;
      if (pass === OWNER_PASSWORD) {
        isOwnerLoggedIn = true;
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('addMusicBox').style.display = 'flex';
        const badge = document.getElementById('statusBadge');
        badge.innerText = 'Владелец';
        badge.classList.add('active');
        alert('Доступ открыт! Теперь ты можешь загружать свои MP3-файлы.');
      } else {
        alert('Неверный пароль!');
      }
    }

    function handleFileUpload(files) {
      Array.from(files).forEach(file => {
        if (file.type.startsWith('audio/')) {
          songs.unshift({
            id: Date.now() + Math.random(),
            title: file.name.replace(/\.[^/.]+$/, ""),
            artist: "Мой трек",
            src: URL.createObjectURL(file),
            cover: `https://picsum.photos/300/300?random=${Math.floor(Math.random()*100)}`
          });
        }
      });
      renderAllLists();
      loadTrack(0);
      togglePlay();
    }

    function loadTrack(index) {
      if (!songs.length) return;
      currentTrackIndex = index;
      const track = songs[index];
      playerTitle.innerText = track.title;
      playerArtist.innerText = track.artist;
      playerCover.src = track.cover;
      audio.src = track.src;
      renderAllLists();
    }

    function togglePlay() {
      if (!audio.src && songs.length) loadTrack(0);
      
      if (audio.paused) {
        audio.play().then(() => {
          playBtn.innerText = '❚❚';
        }).catch(err => {
          console.log("Кликните по странице для запуска");
        });
      } else {
        audio.pause();
        playBtn.innerText = '▶';
      }
    }

    function startMix() {
      songs.sort(() => Math.random() - 0.5);
      loadTrack(0);
      togglePlay();
    }

    function handleSearch() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const found = songs.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q));
      document.getElementById('searchTrackList').innerHTML = found.length 
        ? found.map(s => renderTrackRow(s, songs.indexOf(s))).join('')
        : '<p style="color:#777;">Ничего не найдено</p>';
    }

    function nextTrack() {
      if (!songs.length) return;
      loadTrack((currentTrackIndex + 1) % songs.length);
      togglePlay();
    }

    function prevTrack() {
      if (!songs.length) return;
      loadTrack((currentTrackIndex - 1 + songs.length) % songs.length);
      togglePlay();
    }

    function renderTrackRow(song, index) {
      const isActive = index === currentTrackIndex;
      return `
        <div class="track-row ${isActive ? 'active' : ''}" onclick="selectAndPlay(${index})">
          <div class="track-row-left">
            <img src="${song.cover}" class="track-row-img">
            <div>
              <div class="track-row-title">${song.title}</div>
              <div class="track-row-artist">${song.artist}</div>
            </div>
          </div>
        </div>
      `;
    }

    function selectAndPlay(index) {
      loadTrack(index);
      togglePlay();
    }

    function renderAllLists() {
      document.getElementById('mixTrackList').innerHTML = songs.map((s, i) => renderTrackRow(s, i)).join('');
      document.getElementById('homeTrackList').innerHTML = songs.map((s, i) => renderTrackRow(s, i)).join('');
      handleSearch();
    }

    function switchTab(tabName, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      document.getElementById(`tab-${tabName}`).classList.add('active');
      el.classList.add('active');
    }

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        progressFill.style.width = (audio.currentTime / audio.duration) * 100 + '%';
        document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
        document.getElementById('duration').innerText = formatTime(audio.duration);
      }
    });

    function setProgress(e) {
      const rect = e.currentTarget.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      audio.currentTime = (clickX / rect.width) * audio.duration;
    }

    function formatTime(s) {
      if (isNaN(s)) return "0:00";
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec < 10 ? '0' : ''}${sec}`;
    }

    audio.addEventListener('ended', nextTrack);
    loadTrack(0);
  </script>
</body>
</html>
