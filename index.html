<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Феникс Музыка — Полноценный плеер</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0f0f11;
      color: #fff;
      font-family: 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Основная сетка */
    .app-container {
      display: flex;
      flex: 1;
      height: calc(100vh - 90px);
    }

    /* Боковое меню */
    .sidebar {
      width: 240px;
      background: #161619;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      border-right: 1px solid #222226;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #ffcc00;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .nav-item {
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      color: #a0a0a8;
      font-weight: 600;
      transition: all 0.2s;
    }
    .nav-item:hover, .nav-item.active {
      background: #232328;
      color: #fff;
    }
    .nav-item.active { border-left: 4px solid #ffcc00; }

    /* Главный контент */
    .main-content {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
      background: linear-gradient(180deg, #18181c 0%, #0f0f11 100%);
    }

    .section-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* Поиск */
    .search-input {
      width: 100%;
      max-width: 400px;
      padding: 12px 18px;
      background: #232328;
      border: 1px solid #33333d;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      margin-bottom: 24px;
      outline: none;
    }
    .search-input:focus { border-color: #ffcc00; }

    /* Сетка карточек */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .card {
      background: #1a1a1e;
      padding: 16px;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      border: 1px solid #25252b;
    }
    .card:hover {
      transform: translateY(-4px);
      background: #23232a;
    }
    .card-cover {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 10px;
      object-fit: cover;
      margin-bottom: 12px;
    }
    .card-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-subtitle { color: #888892; font-size: 13px; }

    /* Список треков */
    .track-list { display: flex; flex-direction: column; gap: 8px; }
    .track-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-radius: 10px;
      background: #161619;
      cursor: pointer;
      transition: background 0.2s;
    }
    .track-row:hover, .track-row.active { background: #25252c; }
    .track-row.active .track-row-title { color: #ffcc00; }
    .track-row-left { display: flex; align-items: center; gap: 16px; }
    .track-row-img { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; }
    .track-row-title { font-weight: 600; font-size: 15px; }
    .track-row-artist { color: #888892; font-size: 13px; }
    .like-icon { cursor: pointer; color: #555; font-size: 18px; }
    .like-icon.active { color: #ff3366; }

    /* Нижний плеер */
    .player-bar {
      height: 90px;
      background: #161619;
      border-top: 1px solid #222226;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
    }
    .now-playing { display: flex; align-items: center; gap: 16px; width: 250px; }
    .now-playing-cover { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; }
    
    .player-controls-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 45%;
    }
    .btn-group { display: flex; align-items: center; gap: 20px; }
    .control-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }
    .play-main-btn {
      background: #ffcc00;
      color: #000;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .progress-wrapper { display: flex; align-items: center; gap: 12px; width: 100%; font-size: 12px; color: #777; }
    .progress-bar-bg { flex: 1; height: 4px; background: #333; border-radius: 2px; cursor: pointer; position: relative; }
    .progress-bar-fill { height: 100%; background: #ffcc00; border-radius: 2px; width: 0%; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="sidebar">
      <div class="logo">🔥 Феникс</div>
      <ul class="nav-list">
        <li class="nav-item active" onclick="switchTab('home', this)">Главная</li>
        <li class="nav-item" onclick="switchTab('search', this)">Поиск</li>
        <li class="nav-item" onclick="switchTab('library', this)">Моя коллекция</li>
      </ul>
    </div>

    <div class="main-content">
      
      <div id="tab-home" class="tab-content active">
        <h2 class="section-title">В тренде</h2>
        <div class="cards-grid" id="trendingGrid"></div>
        
        <h2 class="section-title">Все треки</h2>
        <div class="track-list" id="homeTrackList"></div>
      </div>

      <div id="tab-search" class="tab-content">
        <h2 class="section-title">Поиск треков</h2>
        <input type="text" class="search-input" id="searchInput" placeholder="Введите название..." oninput="handleSearch()">
        <div class="track-list" id="searchTrackList"></div>
      </div>

      <div id="tab-library" class="tab-content">
        <h2 class="section-title">Любимые треки (Лайки)</h2>
        <div class="track-list" id="likedTrackList"></div>
      </div>

    </div>
  </div>

  <div class="player-bar">
    <div class="now-playing">
      <img src="" id="playerCover" class="now-playing-cover" alt="">
      <div>
        <div class="card-title" id="playerTitle">Выберите трек</div>
        <div class="card-subtitle" id="playerArtist">—</div>
      </div>
    </div>

    <div class="player-controls-container">
      <div class="btn-group">
        <button class="control-btn" onclick="prevTrack()">⏮</button>
        <button class="control-btn play-main-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="control-btn" onclick="nextTrack()">⏭</button>
      </div>
      <div class="progress-wrapper">
        <span id="currentTime">0:00</span>
        <div class="progress-bar-bg" onclick="setProgress(event)">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <span id="duration">0:00</span>
      </div>
    </div>

    <audio id="audio"></audio>
  </div>

  <script>
    const songs = [
      { id: 1, title: "Phoenix Rises", artist: "Феникс Студио", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", cover: "https://picsum.photos/300/300?random=1", liked: false },
      { id: 2, title: "Neon City", artist: "Cyber Synth", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", cover: "https://picsum.photos/300/300?random=2", liked: false },
      { id: 3, title: "Night Drive", artist: "Beatmaker", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", cover: "https://picsum.photos/300/300?random=3", liked: false },
      { id: 4, title: "Summer Breeze", artist: "Chillout Band", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", cover: "https://picsum.photos/300/300?random=4", liked: false }
    ];

    let currentTrackIndex = 0;
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const playerCover = document.getElementById('playerCover');
    const playerTitle = document.getElementById('playerTitle');
    const playerArtist = document.getElementById('playerArtist');
    const progressFill = document.getElementById('progressFill');

    function loadTrack(index) {
      currentTrackIndex = index;
      const track = songs[index];
      playerTitle.innerText = track.title;
      playerArtist.innerText = track.artist;
      playerCover.src = track.cover;
      audio.src = track.src;
      renderAllLists();
    }

    function togglePlay() {
      if (!audio.src) loadTrack(0);
      if (audio.paused) {
        audio.play();
        playBtn.innerText = '❚❚';
      } else {
        audio.pause();
        playBtn.innerText = '▶';
      }
    }

    function nextTrack() {
      loadTrack((currentTrackIndex + 1) % songs.length);
      audio.play();
      playBtn.innerText = '❚❚';
    }

    function prevTrack() {
      loadTrack((currentTrackIndex - 1 + songs.length) % songs.length);
      audio.play();
      playBtn.innerText = '❚❚';
    }

    function toggleLike(id, e) {
      e.stopPropagation();
      const track = songs.find(s => s.id === id);
      if (track) track.liked = !track.liked;
      renderAllLists();
    }

    function renderTrackRow(song, index) {
      const isActive = index === currentTrackIndex;
      return `
        <div class="track-row ${isActive ? 'active' : ''}" onclick="selectAndPlay(${index})">
          <div class="track-row-left">
            <img src="${song.cover}" class="track-row-img">
            <div>
              <div class="track-row-title">${song.title}</div>
              <div class="track-row-artist">${song.artist}</div>
            </div>
          </div>
          <span class="like-icon ${song.liked ? 'active' : ''}" onclick="toggleLike(${song.id}, event)">♥</span>
        </div>
      `;
    }

    function selectAndPlay(index) {
      loadTrack(index);
      audio.play();
      playBtn.innerText = '❚❚';
    }

    function renderAllLists() {
      // Карточки
      document.getElementById('trendingGrid').innerHTML = songs.map((s, i) => `
        <div class="card" onclick="selectAndPlay(${i})">
          <img src="${s.cover}" class="card-cover">
          <div class="card-title">${s.title}</div>
          <div class="card-subtitle">${s.artist}</div>
        </div>
      `).join('');

      // Главный список
      document.getElementById('homeTrackList').innerHTML = songs.map((s, i) => renderTrackRow(s, i)).join('');

      // Лайки
      const liked = songs.filter(s => s.liked);
      document.getElementById('likedTrackList').innerHTML = liked.length 
        ? liked.map(s => renderTrackRow(s, songs.indexOf(s))).join('')
        : '<p style="color:#777;">Пока нет любимых треков. Нажмите ♥ у трека!</p>';
    }

    function handleSearch() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const found = songs.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q));
      document.getElementById('searchTrackList').innerHTML = found.map(s => renderTrackRow(s, songs.indexOf(s))).join('');
    }

    function switchTab(tabName, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      document.getElementById(`tab-${tabName}`).classList.add('active');
      el.classList.add('active');
    }

    // Прогресс
    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        progressFill.style.width = (audio.currentTime / audio.duration) * 100 + '%';
        document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
        document.getElementById('duration').innerText = formatTime(audio.duration);
      }
    });

    function setProgress(e) {
      const rect = e.currentTarget.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      audio.currentTime = (clickX / rect.width) * audio.duration;
    }

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec < 10 ? '0' : ''}${sec}`;
    }

    audio.addEventListener('ended', nextTrack);

    // Старт
    loadTrack(0);
  </script>
</body>
</html>
